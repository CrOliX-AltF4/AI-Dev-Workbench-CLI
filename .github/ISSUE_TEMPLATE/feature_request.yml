name: Feature Request
description: Suggest a new feature
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        Got an idea to improve AI Dev Workbench CLI? We'd love to hear it!

  - type: textarea
    id: problem
    attributes:
      label: What problem do you want to solve?
      description: Describe the context or frustration behind this feature request.
      placeholder: 'I find it difficult to... / There is no way to...'
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature you have in mind.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Are there other approaches you have thought about?

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - CLI / Interface
        - Pipeline Engine
        - Agents (PO / Planner / Dev / QA)
        - Model Recommendation Engine
        - LLM Providers
        - Storage / Replay
        - Metrics / Monitoring
        - Documentation
        - CI/CD
        - Other
    validations:
      required: true
