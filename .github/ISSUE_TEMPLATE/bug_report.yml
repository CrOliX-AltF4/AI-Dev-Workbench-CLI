name: Bug Report
description: Signaler un bug
labels: ['bug', 'triage']
body:
  - type: markdown
    attributes:
      value: |
        Merci de prendre le temps de signaler ce bug. Remplis les champs ci-dessous avec le plus de détails possible.

  - type: textarea
    id: description
    attributes:
      label: Description du bug
      description: Décris clairement ce qui se passe.
      placeholder: 'Quand je lance `aiwb run`, je reçois...'
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Étapes pour reproduire
      description: Comment reproduire le comportement ?
      placeholder: |
        1. Lancer `aiwb ...`
        2. Entrer `...`
        3. Observer l'erreur
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportement attendu
      description: Ce qui devrait se passer.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environnement
      description: |
        - OS: [ex. Ubuntu 22.04, macOS 14, Windows 11]
        - Node.js: [ex. 20.11.0]
        - Version AIWB: [ex. 0.1.0]
      render: markdown
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Stack trace
      render: shell
