name: Bug Report
description: Report a bug
labels: ['bug', 'triage']
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report this bug. Please fill in the fields below with as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: Clearly describe what is happening.
      placeholder: 'When I run `aiwb run`, I get...'
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can the behavior be reproduced?
      placeholder: |
        1. Run `aiwb ...`
        2. Enter `...`
        3. Observe the error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen instead.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        - OS: [e.g. Ubuntu 22.04, macOS 14, Windows 11]
        - Node.js: [e.g. 20.11.0]
        - AIWB version: [e.g. 0.1.0]
      render: markdown
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Stack trace
      render: shell
